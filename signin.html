<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Nucleus</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); padding:32px;">

  <div style="width:100%; max-width:400px; animation:fadeUp 0.4s var(--t) both;">
    <a href="index.html" class="brand" style="display:flex; justify-content:center; margin-bottom:48px; font-size:20px;">
      nucleus<span class="brand-mark">^</span>
    </a>

    <h2 style="font-size:28px; text-align:center; letter-spacing:-0.025em; margin-bottom:8px;">Welcome back</h2>
    <p class="muted" style="text-align:center; margin-bottom:32px; font-size:15px;">Sign in to your Nucleus account</p>

    <button id="google-btn" onclick="handleGoogleSignIn()" style="
      width:100%; display:flex; align-items:center; justify-content:center; gap:12px;
      padding:14px 20px; background:white; border:1px solid var(--line-2);
      border-radius:var(--r-md); font-size:15px; font-weight:500; cursor:pointer;
      font-family:inherit; color:var(--ink); transition:all 0.18s;
      box-shadow:var(--shadow-1);
    "
    onmouseover="this.style.boxShadow='var(--shadow-2)'; this.style.borderColor='var(--ink-5)'"
    onmouseout="this.style.boxShadow='var(--shadow-1)'; this.style.borderColor='var(--line-2)'">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      <span id="google-btn-label">Continue with Google</span>
    </button>

    <div style="position:relative; margin:28px 0; text-align:center;">
      <div class="divider"></div>
      <span style="position:absolute; top:-9px; left:50%; transform:translateX(-50%); background:var(--bg); padding:0 12px; font-size:13px; color:var(--ink-4);">or</span>
    </div>

    <div style="display:flex; flex-direction:column; gap:14px;">
      <div class="field" style="margin:0;">
        <label>Email</label>
        <input type="email" placeholder="you@example.com" style="width:100%; padding:10px 14px; border:1px solid var(--line-2); border-radius:var(--r-md); background:var(--bg-elev); font-size:14px; font-family:inherit; outline:none;" onfocus="this.style.borderColor='var(--blue)'; this.style.boxShadow='0 0 0 4px var(--blue-tint)'" onblur="this.style.borderColor='var(--line-2)'; this.style.boxShadow='none'"/>
      </div>
      <div class="field" style="margin:0;">
        <label>Password</label>
        <input type="password" placeholder="••••••••" style="width:100%; padding:10px 14px; border:1px solid var(--line-2); border-radius:var(--r-md); background:var(--bg-elev); font-size:14px; font-family:inherit; outline:none;" onfocus="this.style.borderColor='var(--blue)'; this.style.boxShadow='0 0 0 4px var(--blue-tint)'" onblur="this.style.borderColor='var(--line-2)'; this.style.boxShadow='none'"/>
      </div>
      <button onclick="handleEmailSignIn()" class="btn btn-primary btn-block" style="margin-top:4px; padding:12px; font-size:15px;">Sign in</button>
    </div>

    <p style="text-align:center; margin-top:28px; font-size:14px; color:var(--ink-4);">
      Don't have an account?
      <a href="talent.html" style="color:var(--blue); font-weight:500;">Get started →</a>
    </p>
    <p style="text-align:center; margin-top:8px; font-size:13px; color:var(--ink-5);">
      Joining as an institution?
      <a href="institution.html" style="color:var(--ink-4); text-decoration:underline; text-underline-offset:3px;">Register here</a>
    </p>
  </div>

  <div id="toast" class="toast"></div>
  <script>
    function handleGoogleSignIn() {
      const btn = document.getElementById('google-btn');
      const lbl = document.getElementById('google-btn-label');
      btn.disabled = true;
      btn.style.opacity = '0.7';
      lbl.textContent = 'Signing you in…';
      setTimeout(() => { window.location.href = 'match.html?demo=t-001'; }, 1400);
    }
    function handleEmailSignIn() {
      const t = document.getElementById('toast');
      t.textContent = 'Signing you in…';
      t.classList.add('show');
      setTimeout(() => { window.location.href = 'match.html?demo=t-001'; }, 1200);
    }
  </script>
</body>
</html>
